  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-display {
      font-family: 'Playfair Display', serif;
    }
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .category-active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .progress-ring {
      transform: rotate(-90deg);
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

      { id: '24', title: 'No-Code Automation Starter Guide', category: 'ai-automation', type: 'Guide', description: 'Automate tasks without writing code' },

      { id: '53', title: 'Resilience Under Pressure Workbook', category: 'overcoming-adversity', type: 'PDF', description: 'Rebuild confidence in hard seasons' },
      { id: '54', title: 'Adversity Response Framework', category: 'overcoming-adversity', type: 'Guide', description: 'Respond to setbacks effectively' },

      { id: '56', title: 'Crisis Clarity Checklist', category: 'overcoming-adversity', type: 'Checklist', description: 'Stabilize decisions when overwhelmed' },
      { id: '57', title: 'Post-Setback Reflection Template', category: 'overcoming-adversity', type: 'Template', description: 'Extract lessons from setbacks' },
      { id: '58', title: 'Inner Strength Building Guide', category: 'overcoming-adversity', type: 'Guide', description: 'Cultivate emotional endurance' },
      { id: '59', title: 'Healing Through Journaling', category: 'overcoming-adversity', type: 'PDF', description: 'Process stress and regain perspective' },
      { id: '60', title: 'Recovery Routine Checklist', category: 'overcoming-adversity', type: 'Checklist', description: 'Daily recovery practices' },
      { id: '61', title: 'Grounding Practices Audio', category: 'overcoming-adversity', type: 'Audio', description: 'Calm your nervous system' },
      { id: '62', title: 'Resilience Stories Video Series', category: 'overcoming-adversity', type: 'Video', description: 'Real recovery stories and lessons' }
    ];

    // Components
    function Header() {
      return h('header', { className: 'bg-white border-b border-stone-200' },
        h('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8' },
          h('div', { className: 'flex items-center justify-between' },
            h('div', null,
              h('h1', { className: 'font-display text-4xl font-bold text-stone-900 mb-2' },
                'Resource Library'
              ),
              h('p', { className: 'text-lg text-stone-600' },
                '62 premium resources for mindful leaders and modern teams'
              )
            ),
            h('div', { className: 'text-right' },
              h('div', { className: 'text-3xl font-bold text-stone-900' }, '62'),
              h('div', { className: 'text-sm text-stone-500' }, 'Total Resources')
            )
          )
        )
      );
    }

    function TypeBadge({ type }) {
      const colors = {
        'PDF': 'bg-rose-100 text-rose-700',
        'Template': 'bg-blue-100 text-blue-700',
        'Guide': 'bg-emerald-100 text-emerald-700',
        'Audio': 'bg-purple-100 text-purple-700',
        'Video': 'bg-amber-100 text-amber-700',
        'Checklist': 'bg-cyan-100 text-cyan-700'
      };

      return h('span', {
        className: `px-2.5 py-1 text-xs font-semibold rounded-full ${colors[type] || 'bg-stone-100 text-stone-700'}`
      }, type);
    }

    function FeaturedBadge() {
      return h('span', {
        className: 'px-2.5 py-1 text-xs font-semibold rounded-full bg-amber-100 text-amber-700'
      }, '⭐ Featured');
    }

    function ResourceCard({ resource, category }) {
      return h('div', {
        className: 'bg-white rounded-xl p-6 shadow-sm border border-stone-200 card-hover fade-in'
      },
        h('div', { className: 'flex items-start justify-between mb-3' },
          h('div', { className: 'flex gap-2' },
            h(TypeBadge, { type: resource.type }),
            resource.featured && h(FeaturedBadge)
          )
        ),
        h('h3', { className: 'font-semibold text-lg text-stone-900 mb-2' }, resource.title),
        h('p', { className: 'text-stone-600 text-sm mb-4 line-clamp-2' }, resource.description),
        h('button', {
          className: 'w-full py-2.5 px-4 bg-stone-900 hover:bg-stone-800 text-white font-medium rounded-lg transition-colors text-sm'
        }, 'Download Resource')
      );
    }

    function CategoryCard({ category, isActive, onClick }) {
      return h('button', {
        onClick: () => onClick(category.id),
        className: `p-6 rounded-xl border-2 transition-all text-left card-hover ${
          isActive
            ? `category-active border-transparent`
            : 'bg-white border-stone-200 hover:border-stone-300'
        }`
      },
        h('div', { className: 'text-4xl mb-3' }, category.icon),
        h('h3', { className: `font-semibold text-xl mb-2 ${isActive ? 'text-white' : 'text-stone-900'}` }, category.name),
        h('p', { className: `text-sm mb-3 ${isActive ? 'text-white/80' : 'text-stone-600'}` }, category.description),
        h('div', { className: `text-2xl font-bold ${isActive ? 'text-white' : 'text-stone-900'}` },
          category.resources,
          h('span', { className: `text-sm font-normal ${isActive ? 'text-white/70' : 'text-stone-500'}` }, ' resources')
        )
      );
    }

    function Stats({ resources }) {
      const types = resources.reduce((acc, r) => {
        acc[r.type] = (acc[r.type] || 0) + 1;
        return acc;
      }, {});

      return h('div', { className: 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8' },
        Object.entries(types).map(([type, count]) =>
          h('div', { key: type, className: 'bg-white rounded-lg p-4 border border-stone-200' },
            h('div', { className: 'text-2xl font-bold text-stone-900' }, count),
            h('div', { className: 'text-sm text-stone-500' }, type + 's')
          )
        )
      );
    }

    function App() {
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');

      const filteredResources = allResources.filter(resource => {
        const matchesCategory = selectedCategory === 'all' || resource.category === selectedCategory;
        const matchesSearch = resource.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                             resource.description.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      return h('div', { className: 'min-h-screen bg-stone-50' },
        h(Header),
        h('main', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8' },
          // Stats
          h(Stats, { resources: allResources }),

          // Search
          h('div', { className: 'mb-8' },
            h('input', {
              type: 'text',
              placeholder: 'Search resources...',
              value: searchQuery,
              onChange: (e) => setSearchQuery(e.target.value),
              className: 'w-full px-6 py-4 text-lg border-2 border-stone-200 rounded-xl focus:outline-none focus:border-stone-400 bg-white'
            })
          ),

          // Categories
          h('div', { className: 'mb-8' },
            h('div', { className: 'flex gap-3 overflow-x-auto pb-2 scrollbar-hide' },
              h('button', {
                onClick: () => setSelectedCategory('all'),
                className: `px-6 py-3 rounded-lg font-medium whitespace-nowrap transition-colors ${
                  selectedCategory === 'all'
                    ? 'bg-stone-900 text-white'
                    : 'bg-white text-stone-700 hover:bg-stone-100 border border-stone-200'
                }`
              }, 'All Resources'),
              categories.map(cat =>
                h('button', {
                  key: cat.id,
                  onClick: () => setSelectedCategory(cat.id),
                  className: `px-6 py-3 rounded-lg font-medium whitespace-nowrap transition-colors ${
                    selectedCategory === cat.id
                      ? 'bg-stone-900 text-white'
                      : 'bg-white text-stone-700 hover:bg-stone-100 border border-stone-200'
                  }`
                }, `${cat.icon} ${cat.name}`)
              )
            )
          ),

          // Resources Grid
          h('div', { className: 'mb-6 flex items-center justify-between' },
            h('h2', { className: 'text-2xl font-bold text-stone-900' },
              selectedCategory === 'all'
                ? `All Resources (${filteredResources.length})`
                : `${categories.find(c => c.id === selectedCategory)?.name} (${filteredResources.length})`
            )
          ),

          h('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
            filteredResources.map(resource =>
              h(ResourceCard, {
                key: resource.id,
                resource: resource,
                category: categories.find(c => c.id === resource.category)
              })
            )
          ),

          filteredResources.length === 0 && h('div', {
            className: 'text-center py-16'
          },
            h('p', { className: 'text-stone-500 text-lg' }, 'No resources found matching your criteria.')
          )
        )
      );
    }

    // Render
    const root = createRoot(document.getElementById('app'));
    root.render(h(App));
  </script>

</html>
